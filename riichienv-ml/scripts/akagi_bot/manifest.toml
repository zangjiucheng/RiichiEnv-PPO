manifest_version = 1

[bot]
name        = "riichienv-ppo"
display     = "RiichiEnv-PPO"
description = "Runs a trained RiichiEnv-PPO checkpoint (PPO/BC/CQL ActorCritic) live."
version     = "0.1.0"
supported_modes = ["4p", "3p"]

[settings.repo_root]
type    = "string"
label   = "RiichiEnv-PPO repo root (advanced)"
default = ""
help    = "Absolute path to the RiichiEnv-PPO checkout. Leave blank when this bot runs unbundled inside the monorepo (auto-detected); required when running from a packaged Akagi.app, since the bundled bot.py can no longer find it by relative position."

[settings.config_path_4p]
type    = "string"
label   = "4P config YAML"
default = "riichienv-ml/src/riichienv_ml/configs/4p/ppo_transformer.yml"
help    = "Path to the training YAML (defines model_class/encoder_class/model dims). Relative to the RiichiEnv-PPO repo root, or absolute. Default is the BC-trained transformer (bc_model_seq.pth), which beats the CNN head-to-head (rank 2.21 vs 2.5)."

[settings.model_path_4p]
type    = "string"
label   = "4P checkpoint (.pth or dir)"
default = "artifacts/4p/bc_model_seq.pth"
help    = "A directory auto-picks the highest-numbered model_*.pth in it. Default is the human-log BC transformer, the strongest 4p model."

[settings.config_path_3p]
type    = "string"
label   = "3P config YAML"
default = "riichienv-ml/src/riichienv_ml/configs/3p/ppo.yml"

[settings.model_path_3p]
type    = "string"
label   = "3P checkpoint (.pth or dir)"
default = "artifacts/3p/ppo/checkpoints"

[settings.device]
type    = "enum"
label   = "Inference device"
default = "cpu"
choices = ["cpu", "cuda"]

[settings.sample]
type    = "bool"
label   = "Sample actions"
default = false
help    = "Off = greedy argmax (recommended for live play). On = temperature sampling."

[settings.temperature]
type    = "float"
label   = "Sampling temperature"
default = 1.0
help    = "Only used when 'Sample actions' is on."
min     = 0.1
max     = 2.0
step    = 0.1

[settings.online_learning_enabled]
type    = "bool"
label   = "Online learning (beta)"
default = false
help    = "EXPERIMENTAL. Fine-tunes the model on your own live games via a small on-policy PPO update every 4 hanchan. Off by default -- read the README's 'Online learning' section (mechanism, requirements, risks) before enabling. Only produces a correct training signal when every hero decision it logs is actually what happened in-game, which in practice means autoplay must be on."

[settings.online_learning_lr]
type    = "float"
label   = "Online learning: learning rate (advanced)"
default = 0.000001
help    = "Very small on purpose -- each update trains on ~4 hanchan of noisy single-opponent-mix data. Only used when online learning is enabled."
min     = 0.0
max     = 0.0001
step    = 0.0000001

[settings.online_learning_alpha_kl]
type    = "float"
label   = "Online learning: KL anchor strength (advanced)"
default = 0.2
help    = "Regularizes each update toward the checkpoint this live lineage started from (fixed for the lineage's lifetime), so repeated updates can't drift arbitrarily far from the cluster-trained baseline. Higher = more conservative. Only used when online learning is enabled."
min     = 0.0
max     = 2.0
step    = 0.05
